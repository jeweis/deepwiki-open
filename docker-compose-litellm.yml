services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.10-stable
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yml:/app/config.yaml
    env_file:
      - docker-compose-litellm.env
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  deepwiki:
    image: deepwiki-litellm  # Using image name to show it depends on LiteLLM
    build:
      context: .
      dockerfile: Dockerfile-litellm  # ← Using Dockerfile that depends on LiteLLM
    ports:
      - "${PORT:-8001}:${PORT:-8001}"  # API port
      - "3000:3000"  # Next.js port
    env_file:
      - docker-compose-litellm.env
    environment:
      - PORT=${PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      - DEEPWIKI_EMBEDDER_TYPE=${DEEPWIKI_EMBEDDER_TYPE:-openai}
    volumes:
      - deepwiki_data:/root/.adalflow      # Persist repository and embedding data
      - deepwiki_logs:/app/api/logs        # Persist log files across container restarts
    # Resource limits for docker-compose up (not Swarm mode)
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - litellm

volumes:
  deepwiki_data:
    name: deepwiki-open_deepwiki_data
  deepwiki_logs:
    name: deepwiki-open_deepwiki_logs